name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # required for npm OIDC trusted publishing (no NPM_TOKEN secret needed)

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: goreleaser  # binaries must exist on GitHub Releases before postinstall.js can download them

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set package version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}   # strip leading 'v' from tag
          npm version "$VERSION" --no-git-tag-version
        working-directory: npm

      - name: Publish @justestif/openswarm
        # Uses npm OIDC trusted publishing — no NPM_TOKEN secret required.
        # Prerequisite: configure GitHub Actions as a trusted publisher for
        # @justestif/openswarm on npmjs.com (Package Settings → Publishing → OIDC).
        run: npm publish --access public --provenance
        working-directory: npm
