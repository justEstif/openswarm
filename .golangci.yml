version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/justEstif/openswarm

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, unparam]
  max-issues-per-linter: 0
  max-same-issues: 0
