version: 2

project_name: swarm

before:
  hooks:
    - go mod tidy

builds:
  - id: swarm
    main: ./cmd/swarm
    binary: swarm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/justEstif/openswarm/cmd/swarm/commands.version={{.Version}}
      - -X github.com/justEstif/openswarm/cmd/swarm/commands.commit={{.Commit}}
      - -X github.com/justEstif/openswarm/cmd/swarm/commands.date={{.Date}}

archives:
  - id: swarm
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - docs/ARCHITECTURE.md

homebrew_casks:
  - name: openswarm
    binaries:
      - swarm
    repository:
      owner: justEstif
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "brew: update openswarm to {{ .Tag }}"
    homepage: "https://github.com/justEstif/openswarm"
    description: "Multi-agent task orchestration CLI — swarm messaging, tasks, panes, and worktrees"
    license: "MIT"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/swarm"]
          end

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
