version: 2

project_name: swarm

before:
  hooks:
    - go mod tidy

builds:
  - id: swarm
    main: ./cmd/swarm
    binary: swarm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/justEstif/openswarm/cmd/swarm/commands.version={{.Version}}
      - -X github.com/justEstif/openswarm/cmd/swarm/commands.commit={{.Commit}}
      - -X github.com/justEstif/openswarm/cmd/swarm/commands.date={{.Date}}

archives:
  - id: swarm
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - docs/ARCHITECTURE.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
